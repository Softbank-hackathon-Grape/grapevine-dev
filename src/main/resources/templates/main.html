<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grapevine - Deployment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 50px;
      max-width: 600px;
      width: 100%;
    }

    .team-name {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .deploy-button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 30px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .deploy-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .deploy-button:active {
      transform: translateY(0);
    }

    .message {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="container">
  <h1 class="team-name">🍇 Grapevine</h1>
  <p class="subtitle">버튼 하나로 페이지에 쉽게 배포해보세요!</p>

  <form id="deployForm" th:action="@{/deploy}" method="post">
    <div class="form-group">
      <label for="deployer">배포자명 *</label>
      <input type="text" id="deployer" name="deployer" placeholder="이름을 입력하세요" required>
    </div>

    <div class="form-group">
      <label for="changes">변경 사항 *</label>
      <textarea id="changes" name="changes" placeholder="배포할 변경 사항을 입력하세요" required></textarea>
    </div>

    <button type="submit" class="deploy-button">🚀 Deploy</button>
  </form>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 10px; color: #666;">배포 중...</p>
  </div>

  <div class="message" id="message"></div>
</div>

<script th:inline="javascript">
  document.getElementById('deployForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const deployer = document.getElementById('deployer').value;
    const changes = document.getElementById('changes').value;
    const loading = document.getElementById('loading');
    const message = document.getElementById('message');
    const button = document.querySelector('.deploy-button');

    // 로딩 시작
    button.disabled = true;
    loading.style.display = 'block';
    message.style.display = 'none';

    // 서버로 데이터 전송
    fetch('/deploy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        deployer: deployer,
        changes: changes
      })
    })
    .then(response => response.json())
    .then(data => {
      loading.style.display = 'none';
      button.disabled = false;

      if (data.success) {
        message.className = 'message success';
        message.textContent = '✅ 배포가 성공적으로 시작되었습니다!';
        message.style.display = 'block';

        // 폼 초기화
        document.getElementById('deployForm').reset();
      } else {
        message.className = 'message error';
        message.textContent = '❌ 배포 실패: ' + (data.message || '알 수 없는 오류');
        message.style.display = 'block';
      }
    })
    .catch(error => {
      loading.style.display = 'none';
      button.disabled = false;
      message.className = 'message error';
      message.textContent = '❌ 오류가 발생했습니다: ' + error.message;
      message.style.display = 'block';
    });
  });
</script>
</body>
</html>
